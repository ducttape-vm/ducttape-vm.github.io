<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ducttape VM demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/asciinema-player@3/dist/bundle/asciinema-player.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #d8ebf2;
      --surface: #ffffff;
      --border: #b8d4de;
      --text: #1a2b3c;
      --text-dim: #4a6a7a;
      --accent: #2563eb;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 500; }
    a:hover { text-decoration: underline; }

    .hero {
      padding: 3rem 2rem 2rem;
      text-align: center;
      background: linear-gradient(180deg, #c5e0ea 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
    }
    .hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 700;
      color: #0f172a;
    }
    .hero .sub {
      color: var(--text-dim);
      margin-top: 0.5rem;
    }
    .hero .back {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .player-wrap {
      max-width: 820px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<div class="hero">
  <h1>Ducttape VM demo</h1>
  <p class="sub">Build an httpd VM image, run it, and curl the web page.</p>
  <a class="back" href="/">&larr; Home</a>
</div>

<div class="player-wrap">
  <div id="player"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.16.0/dist/bundle/asciinema-player.min.js"></script>
<script>
  AsciinemaPlayer.create('/demo.cast', document.getElementById('player'), {
    cols: 80,
    rows: 24,
    autoplay: true,
    loop: false,
    speed: 1.5,
    idleTimeLimit: 5,
    theme: 'asciinema'
  });
</script>

<footer>
  Part of <a href="https://github.com/ducttape-infra/">ducttape infra tools</a>.
</footer>

</body>
</html>
